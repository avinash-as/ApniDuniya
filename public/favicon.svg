<svg width="155" height="27" viewBox="0 0 155 27" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ─── "pniDuniya" ultra-bold white wordmark ─── -->
  <text x="28" y="20.5"
    font-family="'Inter','Manrope','Segoe UI Variable Display','Segoe UI','Arial Black',system-ui,sans-serif"
    font-size="17"
    font-weight="800"
    fill="white"
    letter-spacing="-0.5">pniDuniya</text>

  <!-- ─── Stylised A mark — thick bold legs matching Q ring weight ─── -->

  <!-- Left leg: outer bows outward, inner returns to near apex — ~5px leg width at base -->
  <path d="M12 1.5
           C 9 8.5, 1 18, 0 26.5
           L 5.5 26.5
           C 8 18, 10.8 9.5, 12 4.5
           Z"
    fill="#F84565"/>

  <!-- Right leg: mirror of left -->
  <path d="M12 1.5
           C 15 8.5, 23 18, 24 26.5
           L 18.5 26.5
           C 16 18, 13.2 9.5, 12 4.5
           Z"
    fill="#F84565"/>

  <!-- Crossbar: spans outer-edge to outer-edge for solid bold bar (~4.5px tall) -->
  <rect x="4.5" y="15" width="15" height="4.5" rx="0.5" fill="#F84565"/>

</svg>
